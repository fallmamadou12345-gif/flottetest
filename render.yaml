services:
  - type: web
    name: syndongo-test
    env: node
    buildCommand: npm install
    startCommand: node serveur.js
    plan: free
    envVars:
      - key: RENDER_FREE
        value: "true"
      - key: PORT
        value: "10000"
    # Pas de disque persistant = instance gratuite sans carte de crédit
    # Les donnees de test sont stockees en /tmp et remises a zero au redemarrage
